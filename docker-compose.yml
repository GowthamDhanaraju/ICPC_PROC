version: "3.9"

# ============================================================
# Batch Video Proctoring Pipeline — Docker Compose Stack
#
# Services:
#   api     — FastAPI server (4 gunicorn workers)
#   worker  — Celery worker for durable job processing
#   db      — PostgreSQL 15 database
#   redis   — Redis 7 broker + result backend
#
# Usage:
#   docker-compose up --build          # start everything
#   docker-compose up --build worker   # start only Celery worker
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: procuser
      POSTGRES_PASSWORD: procpassword
      POSTGRES_DB: proctoring
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procuser -d proctoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis (Celery Broker + Result Backend)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # FastAPI API Server
  # ----------------------------------------------------------
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://procuser:procpassword@db:5432/proctoring
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ENV: production
      TESTING_MODE: "false"
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ----------------------------------------------------------
  # Celery Worker (durable, restartable job processing)
  # ----------------------------------------------------------
  worker:
    build: .
    restart: unless-stopped
    command: >
      celery -A app.orchestration.tasks.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=celery
      --hostname=worker@%h
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://procuser:procpassword@db:5432/proctoring
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ENV: production
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
