[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

# Override settings for test isolation
env =
    DATABASE_URL=sqlite:///./test_proctoring.db
    MOCK_ML_MODELS=True
    TESTING_MODE=True
    ENV=development
    CELERY_BROKER_URL=memory://
    CELERY_RESULT_BACKEND=cache+memory://
